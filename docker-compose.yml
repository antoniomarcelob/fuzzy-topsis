version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: fuzzy_topsis_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fuzzy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fuzzy_secret}
      POSTGRES_DB: ${POSTGRES_DB:-fuzzy_topsis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fuzzy} -d ${POSTGRES_DB:-fuzzy_topsis}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fuzzy_topsis_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fuzzy}:${POSTGRES_PASSWORD:-fuzzy_secret}@db:5432/${POSTGRES_DB:-fuzzy_topsis}
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fuzzy_topsis_web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    command: npm run dev

volumes:
  postgres_data:
